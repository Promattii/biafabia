<!DOCTYPE html>
<html lang="pl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Story</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Podłączenie słownika z tekstami -->
    <script src="translations.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- Przycisk powrotu -->
    <div class="fixed top-4 right-4 z-50">
        <a href="index.html" class="bg-white/80 backdrop-blur-sm hover:bg-white text-gray-700 px-4 py-2 rounded-full shadow-md text-sm font-medium flex items-center gap-2 border border-gray-200 transition-all">
            <span data-i18n="btn-back">🌐 Powrót</span>
        </a>
    </div>

    <!-- Nagłówek -->
    <header class="py-16 px-4 text-center bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg">
        <h1 data-i18n="header-title" class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">Tytuł</h1>
        <p data-i18n="header-subtitle" class="text-lg md:text-xl text-indigo-100 max-w-2xl mx-auto font-light">Podtytuł</p>
    </header>

    <!-- Kontener Osi Czasu -->
    <main class="max-w-6xl mx-auto px-4 py-12 relative">
        
        <div class="absolute left-1/2 transform -translate-x-1/2 top-12 bottom-12 w-1 bg-indigo-200 hidden md:block"></div>
        <div class="absolute left-8 top-12 bottom-12 w-1 bg-indigo-200 block md:hidden"></div>

        <!-- PUNKT 1 -->
        <div class="mb-12 flex flex-col md:flex-row items-center justify-between w-full relative">
            <div class="w-full md:w-[45%] order-2 md:order-1 md:text-right pl-16 md:pl-0">
                <span data-i18n="date-1" class="inline-block px-3 py-1 bg-indigo-100 text-indigo-800 text-sm font-semibold rounded-full mb-2">Data</span>
                <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
                    <h3 data-i18n="title-1" class="text-xl font-bold mb-2 text-indigo-900">Tytuł kafelka</h3>
                    <p data-i18n="desc-1" class="text-gray-600 leading-relaxed">Opis</p>
                    <div class="mt-4 overflow-hidden rounded-lg shadow-sm">
                        <img src="img/dziecko.jpg" class="w-full h-auto max-h-64 object-cover">
                    </div>
                </div>
            </div>
            <div class="absolute left-8 md:left-1/2 transform -translate-x-1/2 w-4 h-4 rounded-full bg-indigo-600 border-4 border-white shadow-md z-10 top-1 md:top-auto"></div>
            <div class="hidden md:block w-[45%] order-2"></div>
        </div>

        <!-- PUNKT 2 -->
        <div class="mb-12 flex flex-col md:flex-row items-center justify-between w-full relative">
            <div class="hidden md:block w-[45%]"></div>
            <div class="absolute left-8 md:left-1/2 transform -translate-x-1/2 w-4 h-4 rounded-full bg-indigo-600 border-4 border-white shadow-md z-10 top-1 md:top-auto"></div>
            <div class="w-full md:w-[45%] order-2 pl-16 md:pl-0">
                <span data-i18n="date-2" class="inline-block px-3 py-1 bg-indigo-100 text-indigo-800 text-sm font-semibold rounded-full mb-2">Data</span>
                <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
                    <h3 data-i18n="title-2" class="text-xl font-bold mb-2 text-indigo-900">Tytuł kafelka</h3>
                    <p data-i18n="desc-2" class="text-gray-600 leading-relaxed">Opis</p>
                    <div class="mt-4 overflow-hidden rounded-lg shadow-sm">
                        <img src="img/szkola.jpg" class="w-full h-auto max-h-64 object-cover">
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer class="py-8 text-center text-gray-400 text-sm border-t border-gray-200 mt-12 bg-white">
        <span data-i18n="footer">Stopka</span>
    </footer>

    <!-- SKRYPT DO PODMIANY JĘZYKA -->
    <script>
        // 1. Pobierz język z linku (np. story.html?lang=en)
        const urlParams = new URLSearchParams(window.location.search);
        let currentLang = urlParams.get('lang');

        // Jeśli ktoś wszedł bez parametru lub zły parametr, ustaw polski
        if(!currentLang || !translations[currentLang]) {
            currentLang = 'pl';
        }

        // 2. Znajdź wszystkie elementy z data-i18n i wklej odpowiedni tekst
        document.querySelectorAll('[data-i18n]').forEach(element => {
            const translationKey = element.getAttribute('data-i18n');
            if (translations[currentLang][translationKey]) {
                element.innerText = translations[currentLang][translationKey];
            }
        });

        // 3. Opcjonalnie: Zmiana atrybutu lang w głównym tagu HTML dla SEO/Czytników
        document.getElementById('html-tag').setAttribute('lang', currentLang);
    </script>
</body>
</html>
